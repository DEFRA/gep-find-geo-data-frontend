#
# This workflow is triggered when a pull request is merged into the main branch and automatically merges the main branch back into develop to keep it up to date.
# If the merge fails (e.g., due to conflicts), a manual intervention is required. The workflow generates a Job summary of the merge attempt.
name: Auto Back-merge Main to Develop

on:
  pull_request:
    types:
      - closed
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  merge-main-to-develop:
    name: Back-merge Main to Develop
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Merge main into develop and Generate Summary
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { number: prNumber, html_url: prUrl } = context.payload.pull_request
            const mergedBy = context.payload.sender.login

            const summary = (heading, body) => core.summary.addRaw(
            `## ${heading}\n\n${body}\n\n` +
            `| Detail | Value |\n|---|---|\n` +
            `| Merged by | @${mergedBy} |\n` +
            `| Triggering PR | [#${prNumber}](${prUrl}) |\n`
            ).write()

            try {
              await github.rest.repos.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: 'develop',
                head: 'main',
                commit_message: `ci(back-merge): merge main into develop (#${prNumber})`
              })

              await summary(
                'Back-merge: success',
                `Merged \`main\` into \`develop\` after PR #${prNumber}.`
              )
            } catch (error) {
              const errorMessage = error.message || String(error)

              await summary(
                'Back-merge: failed',
                `Could not merge \`main\` into \`develop\` after PR #${prNumber}.\n` +
                'Resolve conflicts manually by opening a PR from `main` into `develop`.\n\n' +
                `**Error:** \`${errorMessage}\``
              )

              core.setFailed(`Merge failed: ${errorMessage}`)
            }
