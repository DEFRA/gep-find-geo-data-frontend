name: Publish Develop

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "094954420758"

jobs:
  build:
    name: CDP-build-develop
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Auto version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(git tag --merged HEAD --sort=-v:refname \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -z "$LATEST" ]; then
            LATEST="0.0.0"
          fi
          NEXT=$(echo "$LATEST" | awk -F. '{print $1"."$2"."$3+1}')
          echo "new_tag=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${LATEST} -> ${NEXT}"
          git tag "$NEXT"
          git push origin "$NEXT"

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci
          npm run build:frontend
          npm run lint
          npm test

      - name: Build and Publish
        uses: DEFRA/cdp-build-action/build@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ steps.version.outputs.new_tag }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
