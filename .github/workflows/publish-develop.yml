name: Publish Develop

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "094954420758"

jobs:
  build:
    if: github.run_number != 1
    name: CDP-build-develop
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          TAG=$(git tag --merged HEAD --sort=-v:refname \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          TAG="${TAG:-0.0.0}"
          echo "value=${TAG}-dev.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Calculated version: ${TAG}-dev.${{ github.run_number }}"

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci
          npm run build:frontend
          npm run lint
          npm test

      - name: Build and Publish
        uses: DEFRA/cdp-build-action/build@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ steps.version.outputs.value }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
