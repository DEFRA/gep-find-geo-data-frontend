name: Publish Release

on:
  push:
    branches:
      - 'release/**'

concurrency:
  group: publish-release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "094954420758"

jobs:
  build:
    name: CDP-build-release
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          if ! echo "${{ github.ref_name }}" | grep -qE '^release/[0-9]+\.[0-9]+\.0$'; then
            echo "::error::Branch must be named release/X.Y.0 (e.g. release/0.1.0)"
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          BASE=$(echo "${{ github.ref_name }}" | sed 's|release/||')
          MINOR=$(echo "$BASE" | awk -F. '{print $1"."$2}')
          LATEST=$(git tag --sort=-v:refname \
            | grep -E "^${MINOR}\.[0-9]+$" | head -1)
          if [ -z "$LATEST" ]; then
            VERSION="${BASE}"
          else
            PATCH=$(echo "$LATEST" | awk -F. '{print $3}')
            VERSION="${MINOR}.$((PATCH + 1))"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Calculated version: ${VERSION}"

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci
          npm run build:frontend
          npm run lint
          npm test

      - name: Update package.json version
        run: npm version "${{ steps.version.outputs.value }}" --no-git-tag-version

      # [skip ci] in the commit message prevents this push from re-triggering the workflow
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "ci(release): bump version to ${{ steps.version.outputs.value }} [skip ci]"
          git push

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.value }}"
          git push origin "${{ steps.version.outputs.value }}"

      - name: Build and Publish
        uses: DEFRA/cdp-build-action/build@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ steps.version.outputs.value }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
